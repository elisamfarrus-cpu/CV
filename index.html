<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CVs - Currículums</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(226, 176, 74, 0.03) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 50%, rgba(15, 52, 96, 0.1) 0%, transparent 50%);
    }

    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #e2b04a;
      padding: 3rem 1rem;
      text-align: center;
      box-shadow: 0 8px 32px rgba(226, 176, 74, 0.2);
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, rgba(226, 176, 74, 0.1) 0%, transparent 70%);
    }

    header h1 {
      font-size: 2.8rem;
      margin-bottom: 0.5rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(226, 176, 74, 0.5);
    }

    header p {
      opacity: 0.9;
      font-size: 1.2rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: #ffffff;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    .search-bar {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .search-bar input {
      flex: 1;
      min-width: 200px;
      padding: 0.75rem 1rem;
      border: 1px solid rgba(226, 176, 74, 0.3);
      border-radius: 8px;
      font-size: 1rem;
      background: #1a1a2e;
      color: #e0e0e0;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .search-bar input:focus {
      outline: none;
      border-color: #e2b04a;
      box-shadow: 0 0 15px rgba(226, 176, 74, 0.2);
    }

    .search-bar input::placeholder {
      color: #666;
    }

    .search-bar select {
      padding: 0.75rem 1rem;
      border: 1px solid rgba(226, 176, 74, 0.3);
      border-radius: 8px;
      font-size: 1rem;
      background: #1a1a2e;
      color: #e0e0e0;
      cursor: pointer;
      transition: border-color 0.3s;
    }

    .search-bar select:focus {
      outline: none;
      border-color: #e2b04a;
    }

    .search-bar select option {
      background: #1a1a2e;
      color: #e0e0e0;
    }

    .cv-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }

    .cv-card {
      background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
      cursor: pointer;
      border: 1px solid rgba(226, 176, 74, 0.1);
    }

    .cv-card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 12px 40px rgba(226, 176, 74, 0.15);
      border-color: rgba(226, 176, 74, 0.4);
    }

    .cv-header {
      background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
      color: #e2b04a;
      padding: 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      border-bottom: 1px solid rgba(226, 176, 74, 0.2);
    }

    .cv-avatar {
      width: 65px;
      height: 65px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      border: 2px solid rgba(226, 176, 74, 0.5);
      box-shadow: 0 0 15px rgba(226, 176, 74, 0.2);
    }

    .cv-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .cv-name {
      font-size: 1.3rem;
      font-weight: 400;
      letter-spacing: 0.05em;
    }

    .cv-title {
      font-size: 0.85rem;
      opacity: 0.8;
      margin-top: 0.25rem;
      color: #ffffff;
      font-style: italic;
    }

    .cv-body {
      padding: 1.5rem;
    }

    .cv-section {
      margin-bottom: 1rem;
    }

    .cv-section:last-child {
      margin-bottom: 0;
    }

    .cv-section h4 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #e2b04a;
      margin-bottom: 0.5rem;
    }

    .cv-section p {
      font-size: 0.9rem;
      color: #b0b0b0;
      line-height: 1.6;
    }

    .cv-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .cv-tag {
      background: rgba(226, 176, 74, 0.15);
      color: #e2b04a;
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.8rem;
      border: 1px solid rgba(226, 176, 74, 0.3);
    }

    .cv-contact {
      display: flex;
      gap: 0.75rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(226, 176, 74, 0.2);
    }

    .cv-contact a {
      color: #e2b04a;
      text-decoration: none;
      font-size: 0.85rem;
      transition: color 0.2s;
    }

    .cv-contact a:hover {
      color: #ffffff;
      text-decoration: underline;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
      border-radius: 16px;
      max-width: 700px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      border: 1px solid rgba(226, 176, 74, 0.3);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: rgba(255, 255, 255, 0.9);
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-size: 1.25rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .modal-header {
      background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
      color: #e2b04a;
      padding: 2rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      border-bottom: 1px solid rgba(226, 176, 74, 0.2);
    }

    .modal-header-img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid rgba(226, 176, 74, 0.5);
      flex-shrink: 0;
      box-shadow: 0 0 20px rgba(226, 176, 74, 0.3);
    }

    .modal-header-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .modal-header h2 {
      font-size: 1.8rem;
      margin-bottom: 0.25rem;
      font-weight: 300;
      letter-spacing: 0.08em;
    }

    .modal-header p {
      opacity: 0.9;
      color: #ffffff;
      font-style: italic;
    }

    .modal-body {
      padding: 2rem;
    }

    .modal-section {
      margin-bottom: 1.5rem;
    }

    .modal-section h3 {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #e2b04a;
      margin-bottom: 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid rgba(226, 176, 74, 0.2);
    }

    .modal-section p {
      color: #b0b0b0;
      line-height: 1.6;
    }

    .modal-section ul {
      list-style: none;
      padding: 0;
    }

    .modal-section li {
      padding: 0.5rem 0;
      color: #b0b0b0;
      border-bottom: 1px solid rgba(226, 176, 74, 0.15);
    }

    .modal-section li:last-child {
      border-bottom: none;
    }

    .modal-section li strong {
      color: #e2b04a;
    }

    .modal-section li small {
      color: #888;
      font-style: italic;
    }

    .modal-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .modal-tag {
      background: linear-gradient(135deg, rgba(226, 176, 74, 0.2) 0%, rgba(226, 176, 74, 0.1) 100%);
      color: #e2b04a;
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-size: 0.85rem;
      border: 1px solid rgba(226, 176, 74, 0.3);
    }

    .no-results {
      text-align: center;
      padding: 3rem;
      color: #888;
      font-size: 1.1rem;
      grid-column: 1 / -1;
      font-style: italic;
    }

    @media (max-width: 600px) {
      .cv-grid {
        grid-template-columns: 1fr;
      }

      header h1 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Currículums Vitae</h1>
    <p>Directorio de profesionales</p>
  </header>

  <div class="container">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Buscar por nombre, título o habilidad...">
      <select id="filterSelect">
        <option value="">Todas las categorías</option>
        <option value="Desarrollo">Desarrollo</option>
        <option value="Diseño">Diseño</option>
        <option value="Marketing">Marketing</option>
        <option value="Datos">Datos</option>
        <option value="Gestión">Gestión</option>
      </select>
    </div>

    <div class="cv-grid" id="cvGrid"></div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <button class="modal-close" id="modalClose">&times;</button>
      <div class="modal-header" id="modalHeader"></div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script>
    const cvs = [
      {
        id: 1,
        name: "Sofía Méndez",
        title: "Ingeniera de Machine Learning",
        category: "Datos",
        photo: "https://picsum.photos/seed/sofia/200/200",
        summary: "Especialista en inteligencia artificial con enfoque en procesamiento de lenguaje natural y visión por computadora.",
        experience: [
          { role: "ML Engineer", company: "AI Solutions", period: "2023 - Presente", desc: "Desarrollo de modelos de NLP para análisis de sentimientos en tiempo real." },
          { role: "Data Scientist", company: "NeuralTech", period: "2021 - 2023", desc: "Implementación de redes neuronales convolucionales para clasificación de imágenes médicas." }
        ],
        education: "Doctorado en Inteligencia Artificial - MIT (2019-2023)",
        skills: ["Python", "TensorFlow", "PyTorch", "Scikit-learn", "Hugging Face", "CUDA", "MLOps"],
        email: "sofia.mendez@email.com",
        phone: "+34 611 222 333",
        linkedin: "linkedin.com/in/sofiamendez"
      },
      {
        id: 2,
        name: "Diego Ramírez",
        title: "Arquitecto de Software",
        category: "Desarrollo",
        photo: "https://picsum.photos/seed/diego/200/200",
        summary: "Arquitecto de sistemas distribuidos con 10 años de experiencia en diseño de microservicios y soluciones cloud-native.",
        experience: [
          { role: "Software Architect", company: "CloudScale", period: "2022 - Presente", desc: "Diseño de arquitectura para plataforma de pagos procesando 1M+ transacciones diarias." },
          { role: "Senior Backend Developer", company: "MicroSys", period: "2019 - 2022", desc: "Migración de monolitos a arquitectura de microservicios con gRPC y Kafka." }
        ],
        education: "Máster en Arquitectura de Software - UPM (2017-2018)",
        skills: ["Go", "Java", "Kubernetes", "gRPC", "Kafka", "PostgreSQL", "Redis", "Terraform"],
        email: "diego.ramirez@email.com",
        phone: "+34 622 333 444",
        linkedin: "linkedin.com/in/diegoramirez"
      },
      {
        id: 3,
        name: "Elena Vargas",
        title: "Product Designer",
        category: "Diseño",
        photo: "https://picsum.photos/seed/elena/200/200",
        summary: "Diseñadora de producto enfocada en crear experiencias accesibles y centradas en el usuario para aplicaciones SaaS.",
        experience: [
          { role: "Senior Product Designer", company: "SaaSify", period: "2021 - Presente", desc: "Rediseño completo de dashboard principal aumentando retención en 35%." },
          { role: "UX Designer", company: "DesignFirst", period: "2018 - 2021", desc: "Creación de design system utilizado por 50+ diseñadores y desarrolladores." }
        ],
        education: "Grado en Diseño Gráfico - Universidad de Barcelona (2014-2018)",
        skills: ["Figma", "Design Systems", "Accessibility", "User Testing", "Prototyping", "HTML/CSS"],
        email: "elena.vargas@email.com",
        phone: "+34 633 444 555",
        linkedin: "linkedin.com/in/elenavargas"
      },
      {
        id: 4,
        name: "Andrés Castro",
        title: "Growth Marketing Manager",
        category: "Marketing",
        photo: "https://picsum.photos/seed/andres/200/200",
        summary: "Estratega de crecimiento con experiencia en optimización de funnels y experimentación data-driven.",
        experience: [
          { role: "Head of Growth", company: "ScaleUp Inc", period: "2022 - Presente", desc: "Implementación de estrategia PLG logrando 200% crecimiento en usuarios activos." },
          { role: "Performance Marketer", company: "AdMasters", period: "2020 - 2022", desc: "Gestión de presupuesto de 500k€ en ads con ROAS promedio de 4.5x." }
        ],
        education: "Grado en Administración de Empresas - ESADE (2016-2020)",
        skills: ["Growth Hacking", "SEO/SEM", "Analytics", "CRO", "Email Marketing", "SQL", "HubSpot"],
        email: "andres.castro@email.com",
        phone: "+34 644 555 666",
        linkedin: "linkedin.com/in/andrescastro"
      },
      {
        id: 5,
        name: "Carmen Ortiz",
        title: "Agile Coach",
        category: "Gestión",
        photo: "https://picsum.photos/seed/carmen/200/200",
        summary: "Coach ágil certificada ayudando a organizaciones en su transformación hacia metodologías ágiles y cultura DevOps.",
        experience: [
          { role: "Enterprise Agile Coach", company: "TransformAgile", period: "2021 - Presente", desc: "Transformación ágil de 300+ personas en 5 departamentos diferentes." },
          { role: "Scrum Master", company: "DevSolutions", period: "2018 - 2021", desc: "Facilitación de 3 equipos Scrum logrando aumento de velocidad del 60%." }
        ],
        education: "Máster en Gestión de Proyectos - IE Business School (2017-2018)",
        skills: ["SAFe", "Scrum", "Kanban", "OKRs", "Change Management", "Jira", "Confluence"],
        email: "carmen.ortiz@email.com",
        phone: "+34 655 666 777",
        linkedin: "linkedin.com/in/carmenortiz"
      },
      {
        id: 6,
        name: "Roberto Silva",
        title: "Cybersecurity Engineer",
        category: "Desarrollo",
        photo: "https://picsum.photos/seed/roberto/200/200",
        summary: "Ingeniero de ciberseguridad especializado en pentesting, análisis de vulnerabilidades y arquitecturas zero-trust.",
        experience: [
          { role: "Senior Security Engineer", company: "SecureNet", period: "2022 - Presente", desc: "Implementación de arquitectura zero-trust reduciendo incidentes en 70%." },
          { role: "Penetration Tester", company: "HackLabs", period: "2019 - 2022", desc: "Realización de 100+ auditorías de seguridad para bancos y fintechs." }
        ],
        education: "Grado en Ingeniería de Ciberseguridad - UOC (2015-2019)",
        skills: ["Penetration Testing", "OWASP", "Python", "Burp Suite", "Nmap", "SIEM", "ISO 27001"],
        email: "roberto.silva@email.com",
        phone: "+34 666 777 888",
        linkedin: "linkedin.com/in/robertosilva"
      }
    ];

    const cvGrid = document.getElementById('cvGrid');
    const searchInput = document.getElementById('searchInput');
    const filterSelect = document.getElementById('filterSelect');
    const modalOverlay = document.getElementById('modalOverlay');
    const modalHeader = document.getElementById('modalHeader');
    const modalBody = document.getElementById('modalBody');
    const modalClose = document.getElementById('modalClose');

    function renderCVs(filteredCVs) {
      if (filteredCVs.length === 0) {
        cvGrid.innerHTML = '<div class="no-results">No se encontraron resultados</div>';
        return;
      }

      cvGrid.innerHTML = filteredCVs.map(cv => `
        <div class="cv-card" onclick="openModal(${cv.id})">
          <div class="cv-header">
            <div class="cv-avatar">
              <img src="${cv.photo}" alt="${cv.name}">
            </div>
            <div>
              <div class="cv-name">${cv.name}</div>
              <div class="cv-title">${cv.title}</div>
            </div>
          </div>
          <div class="cv-body">
            <div class="cv-section">
              <p>${cv.summary}</p>
            </div>
            <div class="cv-section">
              <h4>Habilidades</h4>
              <div class="cv-tags">
                ${cv.skills.slice(0, 4).map(s => `<span class="cv-tag">${s}</span>`).join('')}
                ${cv.skills.length > 4 ? `<span class="cv-tag">+${cv.skills.length - 4}</span>` : ''}
              </div>
            </div>
            <div class="cv-contact">
              <a href="mailto:${cv.email}">Email</a>
              <a href="https://${cv.linkedin}" target="_blank">LinkedIn</a>
            </div>
          </div>
        </div>
      `).join('');
    }

    function openModal(id) {
      const cv = cvs.find(c => c.id === id);
      if (!cv) return;

      modalHeader.innerHTML = `
        <div class="modal-header-img">
          <img src="${cv.photo}" alt="${cv.name}">
        </div>
        <div>
          <h2>${cv.name}</h2>
          <p>${cv.title} | ${cv.category}</p>
        </div>
      `;

      modalBody.innerHTML = `
        <div class="modal-section">
          <h3>Perfil</h3>
          <p>${cv.summary}</p>
        </div>
        <div class="modal-section">
          <h3>Experiencia</h3>
          <ul>
            ${cv.experience.map(exp => `
              <li>
                <strong>${exp.role}</strong> - ${exp.company}<br>
                <small>${exp.period}</small><br>
                ${exp.desc}
              </li>
            `).join('')}
          </ul>
        </div>
        <div class="modal-section">
          <h3>Educación</h3>
          <p>${cv.education}</p>
        </div>
        <div class="modal-section">
          <h4 style="font-size: 1rem; text-transform: uppercase; letter-spacing: 0.05em; color: #667eea; margin-bottom: 0.75rem;">Habilidades</h4>
          <div class="modal-tags">
            ${cv.skills.map(s => `<span class="modal-tag">${s}</span>`).join('')}
          </div>
        </div>
        <div class="modal-section">
          <h3>Contacto</h3>
          <p>Email: <a href="mailto:${cv.email}">${cv.email}</a></p>
          <p>Teléfono: ${cv.phone}</p>
          <p>LinkedIn: <a href="https://${cv.linkedin}" target="_blank">${cv.linkedin}</a></p>
        </div>
      `;

      modalOverlay.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      modalOverlay.classList.remove('active');
      document.body.style.overflow = '';
    }

    function filterCVs() {
      const query = searchInput.value.toLowerCase();
      const category = filterSelect.value;

      const filtered = cvs.filter(cv => {
        const matchesSearch = !query ||
          cv.name.toLowerCase().includes(query) ||
          cv.title.toLowerCase().includes(query) ||
          cv.summary.toLowerCase().includes(query) ||
          cv.skills.some(s => s.toLowerCase().includes(query));

        const matchesCategory = !category || cv.category === category;

        return matchesSearch && matchesCategory;
      });

      renderCVs(filtered);
    }

    searchInput.addEventListener('input', filterCVs);
    filterSelect.addEventListener('change', filterCVs);
    modalClose.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) closeModal();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });

    renderCVs(cvs);
  </script>
</body>
</html>
